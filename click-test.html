<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Botão Relé</title>
<style>
body { 
  display:flex; 
  justify-content:center; 
  align-items:center; 
  height:100vh; 
  background:#2a2a2a;
  margin:0;
  font-family:sans-serif;
}
button { 
  width:300px;
  height:300px;
  border-radius:50%;
  border:none; 
  background: linear-gradient(145deg,#FFD700,#FFC300);
  color:#222; 
  font-size:3.5em; 
  cursor:pointer; 
  box-shadow: 0 10px 25px rgba(0,0,0,0.6), 
              inset 0 -6px 15px rgba(0,0,0,0.3), 
              inset 0 6px 10px rgba(255,255,255,0.2);
  transition: all 0.2s ease;
  text-shadow:0 5px 5px rgba(0,0,0,0.4);
}
button:hover {
  transform: scale(1.05);
  box-shadow: 0 12px 30px rgba(0,0,0,0.7), 
              inset 0 -6px 15px rgba(0,0,0,0.3), 
              inset 0 6px 10px rgba(255,255,255,0.25);
}
button:active {
  transform: scale(0.95);
  box-shadow: 0 5px 15px rgba(0,0,0,0.5), 
              inset 0 -3px 8px rgba(0,0,0,0.3), 
              inset 0 3px 6px rgba(255,255,255,0.2);
}
</style>
</head>
<body>
<button id="activateBtn">Ativar</button>
<script>
const btn = document.getElementById("activateBtn");
btn.addEventListener("click", () => {
  fetch('/pulse').then(r => r.text()).then(alert);
});
</script>
</body>
</html>
