<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login</title>
<style>
body { 
  display:flex; 
  justify-content:center; 
  align-items:center; 
  height:100vh; 
  background:#2a2a2a;
  font-family:sans-serif; 
  margin:0;
}
form { 
  display:flex; 
  flex-direction:column; 
  background:#333; 
  padding:40px; 
  border-radius:15px; 
  box-shadow: 0 10px 25px rgba(0,0,0,0.6);
  width:90%;
  max-width:400px;
}
input { 
  margin:10px 0; 
  padding:15px; 
  font-size:1.5em; 
  border-radius:10px; 
  border:none; 
  outline:none;
}
button { 
  margin-top:20px; 
  padding:20px; 
  font-size:1.8em; 
  border-radius:50px; 
  background: linear-gradient(145deg,#FFD700,#FFC300);
  color:#222; 
  border:none; 
  cursor:pointer; 
  box-shadow: 0 10px 20px rgba(0,0,0,0.5), inset 0 -6px 15px rgba(0,0,0,0.3), inset 0 6px 10px rgba(255,255,255,0.2);
  transition: all 0.2s ease;
}
button:hover {
  transform: scale(1.05);
  box-shadow: 0 12px 25px rgba(0,0,0,0.6), inset 0 -6px 15px rgba(0,0,0,0.3), inset 0 6px 10px rgba(255,255,255,0.25);
}
button:active {
  transform: scale(0.95);
  box-shadow: 0 5px 10px rgba(0,0,0,0.4), inset 0 -3px 8px rgba(0,0,0,0.3), inset 0 3px 6px rgba(255,255,255,0.2);
}
</style>
</head>
<body>
<form method="POST" action="/login">
  <input type="text" name="user" placeholder="Usuário" required>
  <input type="password" name="pass" placeholder="Senha" required>
  <button type="submit">Entrar</button>
</form>
</body>
</html>
